site_name: Wind Farm Cluster Tradeoffs
site_description: Discovering worst-case wind farm cluster configurations that maximize design regret
site_author: Julian Quick
repo_url: https://github.com/kilojoules/cluster-tradeoffs
repo_name: kilojoules/cluster-tradeoffs

theme:
  name: material
  palette:
    primary: blue
    accent: light blue
  features:
    - navigation.instant
    - navigation.sections
    - navigation.expand
    - toc.integrate
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Blob Discovery:
    - Methodology: methodology.md
    - Results: results.md
  - Danish Energy Island:
    - Case Study: dei-case-study.md
    - Analysis Protocol: dei-methodology.md
    - Nygaard 2022 Model: dei-nygaard2022.md
    - Wake Sensitivity A=0.02: dei-A0.02.md
    - Wake Sensitivity A=0.10: dei-A0.10.md
  - IFT Bilevel Search:
    - Cost Analysis: cost_tradeoffs.md
    - Multistart Strategies: multistart_strategies.md
  - Replication: replication.md

markdown_extensions:
  - tables
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true

extra_javascript:
  - https://polyfill.io/v3/polyfill.min.js?features=es6
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/kilojoules
